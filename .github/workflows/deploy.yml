name: Deploy to Azure VM

# Fires on any push to main (code changes, hotfixes, manual pushes, etc.)
# The instructions sync workflow handles its own deploy after committing.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Azure VM and rebuild
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            cd ${{ secrets.AZURE_VM_PROJECT_PATH }}
            git pull origin main
            docker compose up -d --build
