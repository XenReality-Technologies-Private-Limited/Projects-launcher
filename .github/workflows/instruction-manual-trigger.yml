# This file is meant for the Instruction-Manual repo, NOT this repo.
# Copy it to:
#   Instruction-Manual/.github/workflows/notify-poc-website.yml
#
# It fires whenever main is pushed and tells the POC Website to sync immediately.
# Requires a secret named POC_WEBSITE_PAT in the Instruction-Manual repo:
#   - Fine-grained PAT with Contents: read+write on POC-Demo-Website
#   - OR classic PAT with repo scope

name: Notify POC Website on push

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync in POC Website
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.POC_WEBSITE_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/XenReality-Technologies-Private-Limited/POC-Demo-Website/dispatches \
            -d '{"event_type":"instruction-manual-updated"}'
          echo "Dispatch sent to POC-Demo-Website."
