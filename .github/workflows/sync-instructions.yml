name: Sync Instruction Manual

# Triggers:
#   1. Every hour (fallback poll)
#   2. Manual run via GitHub UI
#   3. Immediate — when Instruction-Manual repo pushes to main it sends a
#      repository_dispatch event of type "instruction-manual-updated"
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [instruction-manual-updated]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout POC Website
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # INSTRUCTIONS_REPO_PAT must be a fine-grained PAT with read access
      # to the Instruction-Manual repo, stored as a repo/org secret.
      - name: Checkout Instruction Manual
        uses: actions/checkout@v4
        with:
          repository: XenReality-Technologies-Private-Limited/Instruction-Manual
          token: ${{ secrets.INSTRUCTIONS_REPO_PAT }}
          path: _instruction-manual-src

      - name: Sync files and inject PocketBase auth
        run: |
          python3 - <<'PYEOF'
          import re

          SRC = "_instruction-manual-src"
          DST = "pocs/instructions"

          # PocketBase auth guard — keeps pages behind login on xentrack.xenreality.com
          AUTH = (
            "<script>\n"
            "(function(){var a=localStorage.getItem('pocketbase_auth');"
            "if(!a){window.location.replace('/instructions/login.html');return;}"
            "try{if(!JSON.parse(a).token){window.location.replace('/instructions/login.html');}}"
            "catch(e){window.location.replace('/instructions/login.html');}})();\n"
            "</script>"
          )

          import shutil
          shutil.copy(f"{SRC}/css/style.css",      f"{DST}/css/style.css")
          shutil.copy(f"{SRC}/js/app.js",           f"{DST}/js/app.js")
          shutil.copy(f"{SRC}/js/requirements.js",  f"{DST}/js/requirements.js")
          print("Copied css/style.css, js/app.js, js/requirements.js")

          # Video watch button (injected after chip-row in hero, index.html only)
          VIDEO_BTN = (
            "    <div class=\"video-cta-row\">\n"
            "      <button class=\"btn-watch-video\" id=\"btnWatchVideo\">\n"
            "        <span class=\"video-play-icon\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><polygon points=\"5 3 19 12 5 21 5 3\"/></svg></span>\n"
            "        Prefer watching? See the full setup - no reading required\n"
            "      </button>\n"
            "    </div>"
          )

          # Video modal (injected before </main>, index.html only)
          VIDEO_MODAL = (
            "<!-- ── Video modal ── -->\n"
            "<div class=\"xr-video-modal\" id=\"xrVideoModal\">\n"
            "  <div class=\"xr-video-wrap\">\n"
            "    <div class=\"xr-video-hdr\">\n"
            "      <span>XenReality Pi 5 — Setup Walkthrough</span>\n"
            "      <button class=\"xr-video-close\" id=\"xrVideoClose\" aria-label=\"Close video\">\n"
            "        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"/><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"/></svg>\n"
            "      </button>\n"
            "    </div>\n"
            "    <div class=\"xr-video-body\">\n"
            "      <video id=\"xrSetupVideo\" src=\"https://d2uimaqek2eby3.cloudfront.net/Instruction_Manual/Subheading%20(1).mp4\" preload=\"metadata\" playsinline></video>\n"
            "    </div>\n"
            "    <div class=\"xr-video-ctrl\">\n"
            "      <button class=\"xr-ctrl-btn\" id=\"xrVideoPlayBtn\">\n"
            "        <svg class=\"xr-icon-play\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><polygon points=\"5 3 19 12 5 21 5 3\"/></svg>\n"
            "        <svg class=\"xr-icon-pause\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><rect x=\"6\" y=\"4\" width=\"4\" height=\"16\"/><rect x=\"14\" y=\"4\" width=\"4\" height=\"16\"/></svg>\n"
            "      </button>\n"
            "      <div class=\"xr-progress\" id=\"xrProgress\"><div class=\"xr-progress-fill\" id=\"xrProgressFill\"></div></div>\n"
            "      <span class=\"xr-video-time\" id=\"xrVideoTime\">0:00</span>\n"
            "    </div>\n"
            "  </div>\n"
            "</div>"
          )

          for fname in ["index.html", "requirements.html"]:
              with open(f"{SRC}/{fname}") as f:
                  html = f.read()
              # Inject auth right after opening <body> tag
              html = re.sub(r'(<body[^>]*>)', r'\1\n' + AUTH, html, count=1)
              if fname == "index.html":
                  # Link to video CSS/JS (not synced from source, lives in pocs/instructions/)
                  html = html.replace(
                      "</head>",
                      '<link rel="stylesheet" href="css/video-modal.css?v=1">\n</head>',
                      1
                  )
                  # Video watch button after chip-row
                  html = html.replace(
                      '<button class="chip" data-vertical="retail">Retail Setup</button>\n    </div>',
                      '<button class="chip" data-vertical="retail">Retail Setup</button>\n    </div>\n' + VIDEO_BTN,
                      1
                  )
                  # Video modal before </main>
                  html = html.replace("</main>", VIDEO_MODAL + "\n</main>", 1)
                  # Video JS before </body>
                  html = html.replace(
                      "</body>",
                      '<script src="js/video-modal.js?v=1"></script>\n</body>',
                      1
                  )
              with open(f"{DST}/{fname}", "w") as f:
                  f.write(html)
              print(f"Updated {fname} with PocketBase auth")
          PYEOF

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pocs/instructions/
          if git diff --staged --quiet; then
            echo "No changes — already up to date."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(instructions): sync from Instruction-Manual repo"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # GITHUB_TOKEN pushes don't trigger deploy.yml, so we SSH-deploy here
      # directly whenever files actually changed.
      - name: Deploy to Azure VM
        if: steps.commit.outputs.changed == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            cd ${{ secrets.AZURE_VM_PROJECT_PATH }}
            git pull origin main
            docker compose up -d --build
