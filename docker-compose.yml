networks:
  xennet:
    name: xennet
    external: true

services:
  reliance-dash:
    build:
      context: .
      dockerfile: Dockerfile
    image: reliance-dash:1.0
    container_name: reliance-dash
    networks:
      - xennet
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
