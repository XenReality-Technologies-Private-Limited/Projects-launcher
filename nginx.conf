server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── WASM MIME type (not in nginx-alpine defaults) ─────────────────
    location ~* \.wasm$ {
        default_type application/wasm;
    }

    # ── PoC subpaths ─────────────────────────────────────────────────
    location /gravity/ {
        try_files $uri $uri/ /gravity/index.html;
    }
    location /halliMane/ {
        try_files $uri $uri/ /halliMane/index.html;
    }
    location /kalyanKendra/ {
        try_files $uri $uri/ /kalyanKendra/index.html;
    }
    location /kushals/ {
        try_files $uri $uri/ /kushals/index.html;
    }
    location /paragon/ {
        try_files $uri $uri/ /paragon/index.html;
    }
    location /reliance/ {
        try_files $uri $uri/ /reliance/index.html;
    }
    location /sulthan/ {
        try_files $uri $uri/ /sulthan/index.html;
    }
    location /technoSport/ {
        try_files $uri $uri/ /technoSport/index.html;
    }
    location /usPolo/ {
        try_files $uri $uri/ /usPolo/index.html;
    }
    location /vBazaar/ {
        try_files $uri $uri/ /vBazaar/index.html;
    }
    location /vBazaarLive/ {
        try_files $uri /vBazaarLive/index.live.html;
    }
    location /thomsun/ {
        try_files $uri $uri/ /yamaha/index.html;
    }
    location /yamaha/ {
        try_files $uri $uri/ /yamaha/index.html;
    }
    location /hiliteMall/ {
        try_files $uri $uri/ /hiliteMall/index.html;
    }

    # ── Main launcher ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
